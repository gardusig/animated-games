server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/yugioh/ {
        rewrite ^/api/yugioh/(.*)$ /$1 break;
        proxy_pass http://yugioh-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/pokemon/ {
        rewrite ^/api/pokemon/(.*)$ /$1 break;
        proxy_pass http://pokemon-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# 2D Games — microservices stack
# Run: docker compose up --build

services:
  database:
    image: postgres:16-alpine
    container_name: twodgames-database
    environment:
      POSTGRES_USER: twodgames_user
      POSTGRES_PASSWORD: twodgames_password
      POSTGRES_DB: twodgames_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - twodgames-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twodgames_user -d twodgames_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  yugioh-scripts:
    build:
      context: .
      dockerfile: games/yugioh/scripts/Dockerfile
    container_name: twodgames-yugioh-scripts
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: twodgames_user
      DB_PASSWORD: twodgames_password
      DB_NAME: twodgames_db
    depends_on:
      database:
        condition: service_healthy
    networks:
      - twodgames-network

  pokemon-scripts:
    build:
      context: .
      dockerfile: games/pokemon/scripts/Dockerfile
    container_name: twodgames-pokemon-scripts
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: twodgames_user
      DB_PASSWORD: twodgames_password
      DB_NAME: twodgames_db
    depends_on:
      database:
        condition: service_healthy
      yugioh-scripts:
        condition: service_completed_successfully
    networks:
      - twodgames-network

  yugioh-backend:
    build:
      context: games/yugioh/backend
    container_name: twodgames-yugioh-backend
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: twodgames_user
      DB_PASSWORD: twodgames_password
      DB_NAME: twodgames_db
    depends_on:
      pokemon-scripts:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - twodgames-network

  pokemon-backend:
    build:
      context: games/pokemon/backend
    container_name: twodgames-pokemon-backend
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: twodgames_user
      DB_PASSWORD: twodgames_password
      DB_NAME: twodgames_db
    depends_on:
      pokemon-scripts:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - twodgames-network

  launcher:
    build:
      context: .
      dockerfile: launcher/frontend/Dockerfile
    container_name: twodgames-launcher
    ports:
      - "8090:80"
    depends_on:
      yugioh-backend:
        condition: service_healthy
      pokemon-backend:
        condition: service_healthy
    networks:
      - twodgames-network

networks:
  twodgames-network:
    driver: bridge

volumes:
  postgres_data:
